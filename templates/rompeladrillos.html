<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rompe Ladrillos - Datslabs Demo</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles-media.css') }}">
</head>
<body>

    <header class="topbar">
        <div class="navbar">
            <a href="{{ url_for('home') }}" class="brand">
                <img src="{{ url_for('static', filename='img/logoDATSLABS_notcover.png') }}" alt="Logo Datslabs" class="brand-logo">
                <span>Datslabs S.A.S</span>
            </a>

            <ul>
                <li><a href="{{ url_for('home') }}">Inicio</a></li>
                <li><a href="{{ url_for('quienes_somos') }}">Quiénes somos</a></li>
                <li><a href="{{ url_for('servicios') }}">Servicios</a></li>
                <li><a href="{{ url_for('clientes') }}">Clientes</a></li>
                <li><a href="{{ url_for('demos') }}">Demos</a></li>
            </ul>
        </div>
    </header>

    <section class="about-hero game-hero">
        <div class="grid-bg"></div>
        <div class="glow"></div>

        <div class="about-content">
            <h1>Juego Demo</h1>
            <p class="about-subtitle">Tecnología, interacción y experiencia digital en una sola muestra</p>
        </div>
    </section>

    <section class="game-section">
        <canvas id="gameCanvas" width="480" height="320"></canvas>
    </section>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="closeModal">&times;</span>
            <h2>Game Over</h2>
            <button id="restartGame">Reiniciar</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='rompeladrillos.js') }}"></script>
</body>
</html>
